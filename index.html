<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZTBYTE Technology</title>
  <style>
    :root{
      --bg:#081120;
      --bg2:#0f172a;
      --card:#111c31cc;
      --text:#e5eefc;
      --muted:#a8b7d1;
      --brand:#1575bb;
      --brand2:#4d9ad0;
      --accent:#f7981c;
      --success:#25D366;
      --shadow:0 12px 40px rgba(0,0,0,.28);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      overflow-x:hidden;
    }
    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:-1;
      opacity:.55;
    }
    .container{max-width:1200px;margin:auto;padding:0 20px}
    .topbar{
      position:sticky;top:0;z-index:20;
      backdrop-filter:blur(14px);
      background:rgba(6,12,24,.65);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
    }
    .brand-mini{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
    }
    .brand-mini img{
      width:42px;
      height:42px;
      object-fit:contain;
      border-radius:10px;
      background:rgba(255,255,255,.92);
      padding:4px;
    }
    .nav-links{
      display:flex;
      gap:18px;
    }
    .nav-links a{
      color:#fff;
      text-decoration:none;
    }
    .hero{
      padding:90px 0;
    }
    .hero-grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:30px;
      align-items:center;
    }
    .hero-card{
      background:var(--card);
      border-radius:var(--radius);
      padding:38px;
      box-shadow:var(--shadow);
    }
    .hero h1{
      font-size:56px;
      line-height:1.05;
    }
    .hero p{
      color:var(--muted);
      font-size:20px;
    }
    .hero-logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:420px;
      background:rgba(255,255,255,.04);
      border-radius:var(--radius);
      padding:30px;
    }
    .hero-logo{
      width:min(100%,540px);
      animation:fadeFloat 2s ease-out both;
      filter:drop-shadow(0 16px 40px rgba(0,0,0,.35));
    }
    @keyframes fadeFloat{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
    .btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 24px;
      border-radius:12px;
      text-decoration:none;
      color:#fff;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="topbar">
    <div class="container nav">
      <div class="brand-mini">
        <img src="logo.png" alt="ZTBYTE logo">
        <span>ZTBYTE TECHNOLOGY</span>
      </div>
      <div class="nav-links">
        <a href="#">Services</a>
        <a href="#">Projects</a>
        <a href="#">Support</a>
      </div>
    </div>
  </div>

  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-card">
        <h1>Network, Security and Enterprise Support</h1>
        <p>ZTBYTE Technology helps businesses strengthen pfSense, MikroTik, VPN, firewall, routing and cybersecurity operations.</p>
        <a class="btn" href="#">Open Support Ticket</a>
      </div>

      <div class="hero-logo-wrap">
        <img class="hero-logo" src="logo.png" alt="ZTBYTE Technology Logo">
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w,h,particles;

    function resize(){
      w=canvas.width=window.innerWidth;
      h=canvas.height=window.innerHeight;
      particles=Array.from({length:80},()=>({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-.5)*.5,
        vy:(Math.random()-.5)*.5,
        r:Math.random()*2+1
      }));
    }

    function draw(){
      ctx.clearRect(0,0,w,h);
      particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        if(p.x<0||p.x>w)p.vx*=-1;
        if(p.y<0||p.y>h)p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(120,190,255,.7)';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize',resize);
    resize();
    draw();
  </script>
</body>
</html>
